<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Radar — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center">
  <div class="w-full max-w-sm">

    <!-- Logo / brand -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-600">Job Radar</h1>
      <p class="text-sm text-slate-400 mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">

      {% if error %}
      <div class="mb-5 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700
                  text-sm rounded-lg px-4 py-3">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
          <input name="username" type="text" autocomplete="username" autofocus
                 required
                 class="w-full border border-slate-200 rounded-lg px-3.5 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input name="password" type="password" autocomplete="current-password"
                 required
                 class="w-full border border-slate-200 rounded-lg px-3.5 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        transition">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                       rounded-lg py-2.5 text-sm transition-colors">
          Sign in
        </button>
      </form>
    </div>

    <!-- Session notice -->
    <p class="text-center text-xs text-slate-400 mt-5">
      Sessions expire after <span class="font-medium">10 minutes</span> of inactivity.
    </p>

  </div>
</body>
</html>
