<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Radar — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Logo / brand -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-600">Job Radar</h1>
      <p class="text-sm text-slate-400 mt-1">Sign in to access your dashboard</p>
    </div>

    <!-- Card -->
    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm px-8 py-8">

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm text-center">
        Incorrect username or password.
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1.5">Username</label>
          <input
            type="text"
            name="username"
            required
            autofocus
            autocomplete="username"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   transition-shadow"
            placeholder="admin">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1.5">Password</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   transition-shadow"
            placeholder="••••••••">
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm
                 py-2.5 rounded-lg transition-colors">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      Session expires after 8 hours.
    </p>
  </div>

</body>
</html>
